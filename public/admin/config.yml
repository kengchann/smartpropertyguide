backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "settings"
    label: "Site Profile & Settings"
    editor:
      preview: false
    files:
      - file: "src/data/agent.json"
        label: "Profile & Contact Info"
        name: "agent"
        format: "json"
        fields:
          - { label: "Business / Page Name", name: "pageName", widget: "string" }
          - { label: "Cover / Header Photo", name: "coverImage", widget: "image", required: false, hint: "Shows at the top of the About page, behind your profile photo — like a Facebook cover photo. Recommended size 1600x900px or wider." }
          - { label: "Profile Photo", name: "profileImage", widget: "image", required: false, hint: "Her headshot — shows as a circle at the top of the About page and a small icon in the site header. Recommended: a square photo." }
          - { label: "Agent Name", name: "name", widget: "string" }
          - { label: "Title", name: "title", widget: "string", hint: "e.g. Assistant Vice President of Sales" }
          - { label: "Company", name: "company", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string", hint: "Shows big on the homepage headline" }
          - { label: "Bio Paragraphs", name: "bioParagraphs", widget: "list", hint: "Add one paragraph per line — shown on the About page under 'Her Story'" }
          - { label: "Phone (as shown on site)", name: "phoneDisplay", widget: "string", hint: "e.g. 0927 918 0332" }
          - { label: "Phone (international format, for links)", name: "phoneIntl", widget: "string", hint: "e.g. +639279180332 — no spaces or dashes" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp Link", name: "whatsappUrl", widget: "string", hint: "e.g. https://wa.me/639279180332" }
          - { label: "Messenger Link", name: "messengerUrl", widget: "string", hint: "e.g. https://m.me/YourPageName" }
          - { label: "Instagram Handle (as shown on site)", name: "instagramHandle", widget: "string" }
          - { label: "Instagram Link", name: "instagramUrl", widget: "string" }
          - { label: "Years of Experience (as shown on site)", name: "yearsExperienceDisplay", widget: "string" }
          - { label: "Service Areas", name: "serviceAreas", widget: "list", hint: "Add one area per line, e.g. Metro Manila" }
          - { label: "Specialties", name: "specialties", widget: "list", hint: "Add one per line" }

  - name: "projects"
    label: "Featured Developments"
    label_singular: "Development"
    description: "The house-and-lot and condo developments shown on the Featured Developments page."
    folder: "src/content/projects"
    create: true
    delete: true
    slug: "{{fields.name}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{name}} — {{status}}"
    fields:
      - { label: "Project Name", name: "name", widget: "string", hint: "e.g. Emerald Grove Estates" }
      - { label: "Brand / Community Tag", name: "brandTag", widget: "string", hint: "e.g. House & Lot Community (Sample)" }
      - { label: "Development Type", name: "type", widget: "select", options: ["House & Lot", "Condominium"] }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Bacoor, Cavite" }
      - { label: "Starting Price — numbers only", name: "priceFrom", widget: "number", value_type: "int", hint: "Used for sorting only, e.g. 4500000" }
      - { label: "Starting Price — shown on site", name: "priceLabel", widget: "string", hint: "e.g. From ₱4,500,000" }
      - { label: "Bedrooms / Layout", name: "bedrooms", widget: "string", hint: "e.g. 3–4 Bedrooms or Studio – 2BR" }
      - { label: "Floor / Lot Area", name: "areaLabel", widget: "string", hint: "e.g. Lot area: 90–120 sqm" }
      - { label: "Payment Terms", name: "paymentTerms", widget: "list", hint: "Add one per line, e.g. Spot Cash, Bank Financing, Rent-to-Own" }
      - { label: "Status", name: "status", widget: "select", options: ["Selling", "Limited Units Left", "Sold Out"] }
      - { label: "Main Photo", name: "image", widget: "image", hint: "Upload a real photo — recommended size 1200x750px (16:10)" }
      - { label: "Description", name: "body", widget: "markdown", hint: "A few sentences about this development." }
      - { label: "This is placeholder/sample content", name: "isSample", widget: "boolean", default: false, required: false, hint: "Leave unchecked for real projects" }

  - name: "blog"
    label: "Blog Posts"
    label_singular: "Post"
    description: "Articles shown on the Blog page."
    folder: "src/content/blog"
    create: true
    delete: true
    slug: "{{fields.title}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentences shown on the blog listing page" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Carolyn Mendoza" }
      - { label: "Cover Photo", name: "image", widget: "image", hint: "Recommended size 1200x675px (16:9)" }
      - { label: "Save as Draft (hide from site)", name: "draft", widget: "boolean", default: false }
      - { label: "Post Content", name: "body", widget: "markdown" }
      - { label: "This is placeholder/sample content", name: "isSample", widget: "boolean", default: false, required: false, hint: "Leave unchecked for real posts" }
